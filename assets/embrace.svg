  <circle cx="98" cy="42" r="17" fill="#f0cb9e"/>
  <path d="M98 24 C113 24 117 38 115 51 C110 43 104 40 98 40 C92 40 86 43 81 51 C79 38 83 24 98 24 Z" fill="#5b3d1d"/>
  <path d="M83 50 C85 64 111 64 113 50 C113 60 107 70 98 70 C89 70 83 60 83 50 Z" fill="#5b3d1d"/>

